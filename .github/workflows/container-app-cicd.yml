name: Container App CI/CD

on:
  push:
    branches: [ master ]
    paths:
      - 'container_app/**'
      - 'src/**'
      - '.github/workflows/container-app-cicd.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'container_app/**'
      - 'src/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  REGISTRY_LOGIN_SERVER: cracidnidev.azurecr.io
  CONTAINER_APP_NAME: ca-terprint-menudownloader
  RESOURCE_GROUP: rg-dev-acidni-shared
  IMAGE_NAME: terprint-menudownloader

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.build.outputs.image-tag }}
      image-digest: ${{ steps.build.outputs.digest }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure CLI Login
        run: |
          az login --service-principal \
            --username "${{ secrets.ORG_AZURE_CLIENT_ID }}" \
            --password "${{ secrets.ORG_AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.ORG_AZURE_TENANT_ID }}"
          
          az account set --subscription "${{ secrets.ORG_AZURE_SUBSCRIPTION_ID }}"

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name cracidnidev

      - name: Extract metadata
        id: meta
        run: |
          # Create tag based on branch and commit
          SHORT_SHA="${GITHUB_SHA:0:8}"
          
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            TAG="latest-${SHORT_SHA}"
          else
            TAG="pr-${{ github.event.number }}-${SHORT_SHA}"
          fi
          
          echo "tags=${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${TAG}" >> $GITHUB_OUTPUT
          echo "short-sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Tag: ${TAG}"

      - name: Build and push container image
        id: build
        run: |
          cd container_app
          
          SHORT_SHA="${{ steps.meta.outputs.short-sha }}"
          
          # Build with build context as parent directory to access src/
          az acr build \
            --registry cracidnidev \
            --image ${{ env.IMAGE_NAME }}:${SHORT_SHA} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --file Dockerfile \
            ..
          
          # Get the digest
          DIGEST=$(az acr repository show-manifests --name cracidnidev --repository ${{ env.IMAGE_NAME }} --query "[0].digest" -o tsv)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "image-tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    environment: 
      name: dev
      url: https://api.acidni.net/menus/health
      
    steps:
      - name: Azure CLI Login
        run: |
          az login --service-principal \
            --username "${{ secrets.ORG_AZURE_CLIENT_ID }}" \
            --password "${{ secrets.ORG_AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.ORG_AZURE_TENANT_ID }}"
          
          az account set --subscription "${{ secrets.ORG_AZURE_SUBSCRIPTION_ID }}"

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}

      - name: Health Check
        run: |
          # Fetch APIM subscription key from Key Vault (requires Azure login above)
          APIM_KEY=$(az keyvault secret show \
            --vault-name kv-terprint-dev \
            --name apim-subscription-key \
            --query value -o tsv 2>/dev/null || echo "")

          if [ -n "$APIM_KEY" ]; then
            HEALTH_URL="https://api.acidni.net/menus/health"
            echo "Health check via APIM: $HEALTH_URL"
            for i in $(seq 1 12); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "Ocp-Apim-Subscription-Key: $APIM_KEY" \
                "$HEALTH_URL" 2>/dev/null || true)
              if [ "$HTTP_CODE" = "200" ]; then
                echo "Health check passed via APIM (HTTP $HTTP_CODE)"
                exit 0
              fi
              echo "Attempt $i/12 - HTTP $HTTP_CODE - waiting 5s..."
              sleep 5
            done
            echo "::warning::Health check did not return 200 after 12 attempts via APIM"
            exit 1
          else
            echo "::warning::APIM key unavailable — verifying Container App revision status instead"
            STATUS=$(az containerapp revision list \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query "[?properties.active].{health:properties.healthState}" -o tsv | head -1)
            echo "Active revision health state: $STATUS"
            if [ "$STATUS" = "Healthy" ]; then
              echo "Container App revision is Healthy"
              exit 0
            else
              echo "::warning::Container App health state: $STATUS"
              exit 1
            fi
          fi

      - name: Check terprint-tests repo exists
        id: check-repo
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ORG_GH_PAT_TERPRINT_TESTS }}
        run: |
          gh repo view Acidni-LLC/terprint-tests --json name > /dev/null 2>&1
          echo "repo_exists=true" >> $GITHUB_OUTPUT

      - name: Trigger Integration Tests
        if: steps.check-repo.outputs.repo_exists == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORG_GH_PAT_TERPRINT_TESTS }}
          repository: Acidni-LLC/terprint-tests
          event-type: post-deploy-tests
          client-payload: |
            {
              "service": "menu-downloader",
              "environment": "dev",
              "image_tag": "${{ needs.build.outputs.image-tag }}",
              "deployment_url": "https://${{ env.CONTAINER_APP_NAME }}.greenbay-731aa80e.eastus2.azurecontainerapps.io"
            }

  deploy-prod:
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    environment: 
      name: production
      url: https://ca-terprint-menudownloader-prod.greenbay-731aa80e.eastus2.azurecontainerapps.io
      
    steps:
      - name: Azure CLI Login
        run: |
          az login --service-principal \
            --username "${{ secrets.ORG_AZURE_CLIENT_ID }}" \
            --password "${{ secrets.ORG_AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.ORG_AZURE_TENANT_ID }}"
          
          az account set --subscription "${{ secrets.ORG_AZURE_SUBSCRIPTION_ID }}"

      - name: Deploy to Production Container App
        run: |
          # Note: Update resource group and app name for production
          az containerapp update \
            --name ca-terprint-menudownloader-prod \
            --resource-group rg-prod-terprint-ca \
            --image ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}

      - name: Production Health Check
        run: |
          # Fetch APIM subscription key from Key Vault (requires Azure login above)
          APIM_KEY=$(az keyvault secret show \
            --vault-name kv-terprint-dev \
            --name apim-subscription-key \
            --query value -o tsv 2>/dev/null || echo "")

          if [ -n "$APIM_KEY" ]; then
            HEALTH_URL="https://api.acidni.net/menus/health"
            echo "Production health check via APIM: $HEALTH_URL"
            for i in $(seq 1 12); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "Ocp-Apim-Subscription-Key: $APIM_KEY" \
                "$HEALTH_URL" 2>/dev/null || true)
              if [ "$HTTP_CODE" = "200" ]; then
                echo "Production health check passed via APIM (HTTP $HTTP_CODE)"
                exit 0
              fi
              echo "Attempt $i/12 - HTTP $HTTP_CODE - waiting 5s..."
              sleep 5
            done
            echo "::warning::Production health check did not return 200 after 12 attempts"
            exit 1
          else
            echo "::warning::APIM key unavailable — verifying Container App revision status instead"
            STATUS=$(az containerapp revision list \
              --name ca-terprint-menudownloader-prod \
              --resource-group rg-prod-terprint-ca \
              --query "[?properties.active].{health:properties.healthState}" -o tsv | head -1)
            echo "Active revision health state: $STATUS"
            if [ "$STATUS" = "Healthy" ]; then
              echo "Container App revision is Healthy"
              exit 0
            else
              echo "::warning::Container App health state: $STATUS"
              exit 1
            fi
          fi
