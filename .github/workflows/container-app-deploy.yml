name: 🚀 Deploy Menu Downloader Container App

on:
  push:
    branches: [ master, main ]
    paths:
      - 'container_app/**'
      - 'src/**'
      - 'pyproject.toml'
      - '.github/workflows/container-app-deploy.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'container_app/**'
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:

env:
  APP_NAME: terprint-menudownloader
  ENVIRONMENT: dev
  ACR_NAME: cracidnidev
  CONTAINER_APP_NAME: ca-terprint-menudownloader
  RESOURCE_GROUP: rg-dev-acidni-shared

jobs:
  # Build and Test
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r container_app/requirements.txt
          pip install -e .

      - name: 🧪 Run tests
        run: |
          # Run any tests if they exist
          if [ -f "tests/test_*.py" ]; then
            python -m pytest tests/ -v
          else
            echo "No tests found, skipping test step"
          fi

      - name: 🔍 Lint code
        run: |
          # Install linting tools
          pip install flake8 black
          
          # Run black formatter check
          black --check container_app/ src/ || echo "Code formatting issues found"
          
          # Run flake8 linting (allow some common issues)
          flake8 container_app/ src/ --max-line-length=120 --ignore=E501,W503,E203 || echo "Linting issues found"

  # Build and Push Container
  build-container:
    name: 🐳 Build Container
    runs-on: ubuntu-latest
    needs: build-and-test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
    outputs:
      image-tag: ${{ steps.build.outputs.image-tag }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.ORG_AZURE_CREDENTIALS }}

      - name: 🐳 Build and push container
        id: build
        run: |
          # Generate unique tag
          IMAGE_TAG="ci-$(date +%Y%m%d)-${GITHUB_SHA:0:8}"
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          
          # Build and push to ACR
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.APP_NAME }}:$IMAGE_TAG \
            --image ${{ env.APP_NAME }}:latest \
            --file container_app/Dockerfile \
            .
          
          echo "✅ Built and pushed: ${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:$IMAGE_TAG"

  # Deploy to Container Apps
  deploy-container-app:
    name: 🚀 Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build-container
    environment: ${{ github.ref == 'refs/heads/master' && 'development' || 'staging' }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.ORG_AZURE_CREDENTIALS }}

      - name: 🚀 Deploy to Container Apps
        run: |
          IMAGE_NAME="${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ needs.build-container.outputs.image-tag }}"
          
          echo "🚀 Deploying $IMAGE_NAME to ${{ env.CONTAINER_APP_NAME }}"
          
          # Update container app with new image and environment variables
          # NOTE: batch-processor is a Container App, not a Function App — no ?code= key needed
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image $IMAGE_NAME \
            --set-env-vars \
              "PORT=8000" \
              "AZURE_STORAGE_ACCOUNT_NAME=stterprintsharedgen2" \
              "AZURE_CONTAINER_NAME=jsonfiles" \
              "BATCH_PROCESSOR_URL=https://ca-terprint-batchprocessor.greenbay-731aa80e.eastus2.azurecontainerapps.io/api/run-batch-processor" \
              "TRULIEVE_DEV_MODE=false"
          
          echo "✅ Deployment completed successfully"

      - name: ✅ Verify deployment
        run: |
          echo "🔍 Verifying deployment health..."
          
          # Get the container app URL
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          
          if [ -n "$FQDN" ]; then
            echo "🌐 Container App URL: https://$FQDN"
            
            # Wait a bit for the deployment to be ready
            sleep 30
            
            # Check health endpoint
            if curl -f "https://$FQDN/health" --max-time 10; then
              echo "✅ Health check passed"
            else
              echo "⚠️  Health check failed, but deployment may still be starting"
            fi
          else
            echo "⚠️  Could not retrieve FQDN, but deployment was successful"
          fi

  # Trigger Integration Tests
  trigger-integration-tests:
    name: 🧪 Trigger Integration Tests
    runs-on: ubuntu-latest
    needs: deploy-container-app
    if: success() && github.ref == 'refs/heads/master'
    steps:
      - name: Check terprint-tests repo exists
        id: check-repo
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ORG_GH_PAT_TERPRINT_TESTS }}
        run: |
          gh repo view Acidni-LLC/terprint-tests --json name > /dev/null 2>&1
          echo "repo_exists=true" >> $GITHUB_OUTPUT

      - name: 🧪 Trigger Terprint Integration Tests
        if: steps.check-repo.outputs.repo_exists == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORG_GH_PAT_TERPRINT_TESTS }}
          repository: Acidni-LLC/terprint-tests
          event-type: post-deploy-tests
          client-payload: |
            {
              "service": "${{ env.APP_NAME }}",
              "environment": "${{ env.ENVIRONMENT }}",
              "deployed_at": "${{ github.event.head_commit.timestamp }}",
              "commit_sha": "${{ github.sha }}"
            }

      - name: 📝 Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ env.APP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ env.ENVIRONMENT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container App | ${{ env.CONTAINER_APP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Menu Downloader deployed successfully!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Integration Tests Triggered**: https://github.com/Acidni-LLC/terprint-tests/actions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Dashboard**: https://brave-stone-0d8700d0f.3.azurestaticapps.net" >> $GITHUB_STEP_SUMMARY